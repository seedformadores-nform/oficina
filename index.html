<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória - Formadores em Campo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle, #1a472a 0%, #0a2414 100%);
            min-height: 100vh;
            color: white;
        }

        .perspective {
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* Mantém a carta virada se estiver com a classe flipped */
        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .card-front {
            background: linear-gradient(135deg, #2d5a27 0%, #1e3c1a 100%);
            border: 2px solid #4ade80;
        }

        .card-back {
            background-color: white;
            color: #1a472a;
            transform: rotateY(180deg);
            font-weight: bold;
            border: 4px solid #facc15;
        }

        /* Estilo para quando o par é encontrado */
        .card-inner.matched .card-back {
            border-color: #4ade80; /* Borda verde para indicar acerto */
            background-color: #f0fdf4;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.5);
        }

        .soccer-ball-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Cabeçalho -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter text-yellow-400 uppercase drop-shadow-lg">
                Formadores em Campo
            </h1>
            <p class="text-green-200 mt-2 font-medium italic">"Tática, foco e ferramentas para a vitória!"</p>
            
            <div class="flex justify-center gap-4 md:gap-8 mt-6">
                <div class="bg-black/40 px-4 md:px-6 py-2 rounded-xl border border-white/20">
                    <span class="text-[10px] md:text-sm uppercase tracking-widest block">Acertos</span>
                    <div id="score" class="text-xl md:text-2xl font-bold text-yellow-400">0 / 6</div>
                </div>
                <div class="bg-black/40 px-4 md:px-6 py-2 rounded-xl border border-white/20">
                    <span class="text-[10px] md:text-sm uppercase tracking-widest block">Tentativas</span>
                    <div id="attempts" class="text-xl md:text-2xl font-bold text-white">0</div>
                </div>
            </div>
        </div>

        <!-- Grelha do Jogo -->
        <div id="game-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-8">
            <!-- Gerado via JS -->
        </div>

        <!-- Controlos -->
        <div class="text-center">
            <button id="reset-btn" class="bg-yellow-500 hover:bg-yellow-400 text-black font-extrabold py-3 px-10 rounded-full transition-all transform hover:scale-105 active:scale-95 shadow-xl uppercase tracking-wider">
                Novo Jogo
            </button>
        </div>
    </div>

    <!-- Modal de Vitória -->
    <div id="win-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white text-green-900 p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl border-4 border-yellow-400">
            <div class="text-6xl mb-4">⚽🏆</div>
            <h2 class="text-3xl font-black mb-2 uppercase italic">Partida Encerrada!</h2>
            <p class="text-lg mb-6">Completaste o esquema tático da jornada com sucesso!</p>
            <button onclick="resetGame()" class="w-full bg-green-700 text-white font-bold py-3 rounded-xl hover:bg-green-800 transition-colors uppercase tracking-widest">
                Jogar Novamente
            </button>
        </div>
    </div>

    <script>
        const pairs = [
            { a: "Escalar todas as reuniões da Jornada 2 de uma só vez.", b: "Google Agenda", id: 1 },
            { a: "Publicar o link do Meet e a pauta com 24h de antecedência.", b: "Mural do Classroom (Premissa 3)", id: 2 },
            { a: "Dividir o time em vestiários para conversas em pequenos grupos.", b: "Salas Temáticas (Meet)", id: 3 },
            { a: "Responder as dúvidas do seu time ou do tutor em até 24 horas.", b: "Comunicação Efetiva", id: 4 },
            { a: "Esquema tático e estudo de jogadas.", b: "Participação nos Papos Formativos", id: 5 },
            { a: "Registrar os lances do jogo.", b: "LRCO, Relatório H.A e feedbacks de avaliações", id: 6 }
        ];

        let flippedCards = [];
        let matchedPairs = 0;
        let attempts = 0;
        let isLock = false;

        function createDeck() {
            const deck = [];
            pairs.forEach(pair => {
                deck.push({ text: pair.a, pairId: pair.id });
                deck.push({ text: pair.b, pairId: pair.id });
            });
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        function renderGame() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            const deck = createDeck();

            deck.forEach((cardData, index) => {
                const card = document.createElement('div');
                card.className = 'perspective h-40 lg:h-44';
                card.innerHTML = `
                    <div class="card-inner" data-pair-id="${cardData.pairId}">
                        <div class="card-front">
                            <span class="soccer-ball-icon">⚽</span>
                        </div>
                        <div class="card-back overflow-hidden">
                            <p class="text-[11px] md:text-sm leading-tight font-bold px-1">${cardData.text}</p>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => handleCardClick(card.querySelector('.card-inner')));
                grid.appendChild(card);
            });
        }

        function handleCardClick(cardInner) {
            // Se o jogo estiver travado ou a carta já estiver virada/combinada, ignore
            if (isLock || cardInner.classList.contains('flipped') || cardInner.classList.contains('matched')) return;

            // Vira a carta
            cardInner.classList.add('flipped');
            flippedCards.push(cardInner);

            if (flippedCards.length === 2) {
                isLock = true;
                attempts++;
                document.getElementById('attempts').innerText = attempts;
                
                const [card1, card2] = flippedCards;
                const match = card1.dataset.pairId === card2.dataset.pairId;

                if (match) {
                    matchedPairs++;
                    document.getElementById('score').innerText = `${matchedPairs} / 6`;
                    
                    // Se houver match, adicionamos a classe 'matched' e NÃO removemos a 'flipped'
                    // Isso garante que elas fiquem viradas para cima
                    setTimeout(() => {
                        card1.classList.add('matched');
                        card2.classList.add('matched');
                        flippedCards = [];
                        isLock = false;
                        if (matchedPairs === 6) showWinModal();
                    }, 400);
                } else {
                    // Se não houver match, desvira após um tempo
                    setTimeout(() => {
                        card1.classList.remove('flipped');
                        card2.classList.remove('flipped');
                        flippedCards = [];
                        isLock = false;
                    }, 1000);
                }
            }
        }

        function showWinModal() {
            setTimeout(() => {
                document.getElementById('win-modal').classList.remove('hidden');
            }, 500);
        }

        function resetGame() {
            matchedPairs = 0;
            attempts = 0;
            flippedCards = [];
            isLock = false;
            document.getElementById('score').innerText = `0 / 6`;
            document.getElementById('attempts').innerText = `0`;
            document.getElementById('win-modal').classList.add('hidden');
            renderGame();
        }

        document.getElementById('reset-btn').addEventListener('click', resetGame);
        window.onload = renderGame;
    </script>
</body>
</html>
